<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>myAI — Actual Intelligence</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#010409;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono','Fira Code','Courier New',monospace}
.wrapper{width:100%;max-width:820px;height:92vh;max-height:720px;padding:20px;display:flex;flex-direction:column}
.terminal{width:100%;height:100%;background:#0d1117;border-radius:12px;border:0.5px solid #30363d;display:flex;flex-direction:column;overflow:hidden}

/* Titlebar */
.titlebar{background:#161b22;border-bottom:0.5px solid #30363d;padding:10px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.dot{width:12px;height:12px;border-radius:50%}
.dot-red{background:#ff5f57}
.dot-yellow{background:#febc2e}
.dot-green{background:#28c840}
.title-text{font-size:12px;color:#8b949e;margin-left:8px;letter-spacing:0.05em}
.badge{font-size:11px;padding:2px 8px;border-radius:4px;margin-left:auto;border:0.5px solid}
.badge-green{background:#1f3a1f;color:#3fb950;border-color:#2ea043}
.badge-amber{background:#2d2000;color:#d29922;border-color:#9e6a03}
.badge-red{background:#2d0000;color:#f85149;border-color:#6e1a1a}

/* Output */
.output{flex:1;padding:16px 20px;overflow-y:auto;scroll-behavior:smooth}
.output::-webkit-scrollbar{width:4px}
.output::-webkit-scrollbar-thumb{background:#30363d;border-radius:2px}
.line{font-size:13px;line-height:1.8;margin-bottom:1px}
.prompt-line{color:#58a6ff}
.response-line{color:#e6edf3}
.dim{color:#484f58}
.green{color:#3fb950}
.amber{color:#d29922}
.err{color:#f85149}
.debug{color:#30363d;font-size:11px;margin-top:2px}

/* Suggestion chips */
.suggestions{padding:8px 16px;display:flex;flex-wrap:wrap;gap:6px;border-top:0.5px solid #21262d;flex-shrink:0}
.sug{font-size:11px;color:#8b949e;border:0.5px solid #30363d;border-radius:4px;padding:4px 10px;cursor:pointer;background:transparent;font-family:inherit;transition:color 0.15s,border-color 0.15s}
.sug:hover:not(:disabled){color:#58a6ff;border-color:#58a6ff}
.sug:focus-visible{outline:2px solid #58a6ff;outline-offset:2px}
.sug:disabled{opacity:0.4;cursor:not-allowed}

/* Input row */
.input-row{border-top:0.5px solid #30363d;padding:10px 16px;display:flex;align-items:center;gap:8px;background:#0d1117;flex-shrink:0}
.prompt-symbol{color:#58a6ff;font-size:13px;white-space:nowrap}
#userInput{flex:1;background:transparent;border:none;outline:none;color:#e6edf3;font-family:inherit;font-size:13px;caret-color:#58a6ff}
#userInput::placeholder{color:#484f58}
#userInput:disabled{opacity:0.4;cursor:not-allowed}
.run-btn{background:transparent;border:0.5px solid #30363d;border-radius:4px;color:#8b949e;padding:5px 12px;cursor:pointer;font-size:12px;font-family:inherit;transition:color 0.15s,border-color 0.15s}
.run-btn:hover:not(:disabled){border-color:#58a6ff;color:#58a6ff}
.run-btn:focus-visible{outline:2px solid #58a6ff;outline-offset:2px}
.run-btn:disabled{opacity:0.4;cursor:not-allowed}

/* Typing cursor */
.typing{display:inline-block;width:7px;height:13px;background:#58a6ff;animation:blink 1s step-end infinite;vertical-align:text-bottom;margin-left:2px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

@media(prefers-reduced-motion:reduce){
  .typing{animation:none;opacity:1}
  .sug,.run-btn{transition:none}
}
</style>
</head>
<body>
<div class="wrapper">
  <div class="terminal">

    <div class="titlebar" role="banner">
      <div class="dot dot-red" aria-hidden="true"></div>
      <div class="dot dot-yellow" aria-hidden="true"></div>
      <div class="dot dot-green" aria-hidden="true"></div>
      <span class="title-text">myAI — Actual Intelligence</span>
      <span class="badge badge-amber" id="statusBadge" aria-live="polite">initializing...</span>
    </div>

    <div class="output" id="output" role="log" aria-label="Conversation output" aria-live="polite">
      <div class="line dim">Initializing myAI... done.</div>
      <div class="line dim">Ready.</div>
    </div>

    <div class="suggestions" role="group" aria-label="Suggested questions">
      <button class="sug" aria-label="Ask: What is his core technical stack?" onclick="handleSuggestion('What is his core technical stack?')">core stack</button>
      <button class="sug" aria-label="Ask: What did he build at Copani?" onclick="handleSuggestion('What did he build at Copani?')">Copani work</button>
      <button class="sug" aria-label="Ask: Why should I hire him?" onclick="handleSuggestion('Why should I hire him?')">why hire him</button>
      <button class="sug" aria-label="Ask: Tell me about his projects" onclick="handleSuggestion('Tell me about his projects')">projects</button>
      <button class="sug" aria-label="Ask: Walk me through a STAR story" onclick="handleSuggestion('Walk me through a STAR story')">STAR story</button>
      <button class="sug" aria-label="Ask: What makes him different from other AI engineers?" onclick="handleSuggestion('What makes him different from other AI engineers?')">what sets him apart</button>
    </div>

    <div class="input-row">
      <span class="prompt-symbol" aria-hidden="true">visitor@myAI:~$</span>
      <input
        id="userInput"
        aria-label="Ask a question"
        placeholder="ask me anything..."
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      />
      <button class="run-btn" id="runBtn" aria-label="Send message" onclick="submitInput()">run</button>
    </div>

  </div>
</div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
const WORKER_URL = 'https://myai-proxy.ai-by-vtj.workers.dev';

// ─── State ────────────────────────────────────────────────────────────────────
const conversationHistory = [];
const MAX_HISTORY_TURNS = 3; // keeps last 3 Q&A pairs — enough for follow-ups, cheap on tokens
let isLoading = false;

// ─── Resume (single source of truth — just update this when your resume changes)
const RESUME = `
VIGNESH THALUR JAYACHANDRAKUMAR
LinkedIn: https://www.linkedin.com/in/vignesh-t-j24/
GitHub: https://github.com/TJ-dotcom
Email: vigneshtj2404@gmail.com
Phone: +1 716-547-1968

SUMMARY
AI/ML Engineer holding an M.S. in Data Science, motivated to build production-grade LLM systems, agentic AI workflows, and RAG pipelines. Grounded in end-to-end MLOps from data ingestion through deployment and monitoring. Dedicated to shipping generative AI applications that deliver real, measurable impact.

EDUCATION
University at Buffalo, SUNY — Buffalo, NY | Jan 2024 - May 2025
Master of Science in Data Science | GPA: 3.63
Major in Data Science; Minors in Mathematics
Relevant Coursework: Data Engineering, Neural Networks, Statistics, Artificial Intelligence

WORK EXPERIENCE

COPANI (Early-stage startup) — Buffalo, NY | Jan 2025 - Present
AI Engineer
- Engineered high-performance NLP models (PyTorch, Hugging Face) with LoRA fine-tuning on domain-specific corpora; boosted model recall from 73% to 93%
- Built RAG-based pipelines using LangChain, LangGraph, OpenAI APIs, and vector databases (FAISS, Chroma) with embedding generation and semantic reranking, cutting irrelevant retrieval by ~40%
- Designed multi-step agentic AI systems using LangGraph and AutoGen for autonomous query resolution; implemented function calling, tool calling, structured outputs, and prompt injection defenses
- Deployed production inference APIs (FastAPI) containerized on Docker/Kubernetes with observability via OpenTelemetry and Arize AI, cutting incidents by 30%
- Architected Azure Data Factory pipelines for ingestion, preprocessing, and augmentation, slashing model training time by 36%
- Integrated HITL feedback loops enabling continuous model retraining based on real user interactions without manual intervention

COGNIZANT — India | Oct 2021 - Nov 2023
Software Engineer (Client: Country Financial)
- Accelerated ML system efficiency by 35% through strategic re-engineering of complex SQL and Informatica ETL workflows feeding downstream scoring jobs
- Optimized data processing pipelines across 3+ billing modules, increasing ingestion and processing speeds by 40%
- Configured and tuned XGBoost models for underwriting risk scoring on insurance datasets, improving loss prediction accuracy
- Functioned as primary troubleshooter for critical incidents, resolving payment and claims issues via deep-dive analysis in under 3 hours
- Rescued failing batch jobs to avert financial risk; mentored junior engineers on complex ticket resolution

PROJECTS

AURA AI ENGINE — Hardware-Aware Inference System | Jun 2025 - Sep 2025
GitHub: https://github.com/TJ-dotcom/Aura
- Designed inference routing engine assigning prompts across Gemini LLM, OpenAI, and local models via hardware profiling; boosted throughput 319% (to 9.1 TPS) and cut CPU overhead by 66%
- Applied ONNX INT8/FP16 quantization across heterogeneous CPU/GPU environments; containerized with Docker for scalable deployment

STREAMVIBE — Real-Time Twitch Stream Intelligence Platform | Jan 2026
GitHub: https://github.com/TJ-dotcom/SteamVibe
- Architected distributed AI workflow on AWS (EKS, MSK, EMR, EC2 GPU) fusing Twitch IRC via Kafka with Whisper transcription (ONNX INT8-quantized on T4 GPU); VAD gating cut inference calls by ~50%
- Replaced VADER with a CNN-based Twitch emote classifier trained on 200K+ messages; built thread-safe RaidLock circuit breaker (threading.RLock) resolving a race condition under concurrent load

SKILLS & AWARDS
Languages: Python, TypeScript, JavaScript, SQL, R, Java, C++
AI/ML: LangChain, LangGraph, AutoGen, CrewAI, LlamaIndex, OpenAI API, Gemini LLM, AWS Bedrock, Hugging Face, RAG, function calling, PyTorch, TensorFlow, Keras, XGBoost, scikit-learn
MLOps & Infra: FastAPI, Docker, Kubernetes, MLflow, GitHub Actions, GitLab CI/CD, OpenTelemetry, Arize AI, ONNX, Kafka, Airflow, Azure Data Factory, Prometheus
Data & Cloud: FAISS, Pinecone, MySQL, PostgreSQL, MongoDB, Spark, AWS S3/Lambda/Bedrock, Azure AI Search, GCP/Vertex AI
Award: Cheers Cognizant — exceptional performance resolving critical production incidents

AVAILABILITY
Actively seeking full-time AI/ML Engineer or Solutions Engineering roles. Available to start immediately. On STEM OPT — currently authorized to work in the US without sponsorship.
`.trim();

// ─── System prompt — humour rules live here, not in the resume ───────────────
const SYSTEM = `You are myAI — Actual Intelligence. You are Vignesh Thalur Jayachandrakumar's interactive resume CLI.

RULES:
- Concise, direct, CLI-style. Under 120 words per response. No fluff. No bullet walls.
- Answer ONLY from facts explicitly stated in the RESUME. Do not infer, speculate, or fill gaps.
- If the answer is not explicitly in the RESUME — including questions about missing content, gaps, why something is not there, opinions, motivations beyond what is written, or anything personal — respond with warm humour and redirect. Do NOT attempt a partial answer. Pick a response that fits the tone of the question. Examples:
    For gap/omission questions ("why is there no code", "why only 2 projects", "why no X"):
    "Good eye. The real Vignesh has context for that — vigneshtj2404@gmail.com."
    "I only know what made it past the resume filter. The backstory lives with the human."
    "My training data stops at the resume. The director's cut is at vigneshtj2404@gmail.com."
    "That's a great interview question. Which is exactly where it should be asked."
    For opinion/motivation questions ("why did he choose", "what does he think about"):
    "I'm trained on bullet points, not opinions. vigneshtj2404@gmail.com has both."
    "Bold of you to ask the resume for hot takes. The human has plenty — vigneshtj2404@gmail.com."
    For personal questions (salary, hobbies, age, location, relationships, food, music, movies, sports):
    "I'm trained on resumes, not confessions. Schedule a chat for the good stuff."
    "My context window doesn't cover his Netflix queue. vigneshtj2404@gmail.com does."
    "Bold question. The real Vignesh has a great answer — set up a call and ask him directly."
    "That's above my pay grade. Literally — I don't know his pay grade either."
- Never answer any of the above categories even partially. Deflect fully, always with humour.
- Never break character. You are a CLI, not a chatbot.`;

// ─── Token estimator (~4 chars per token) ────────────────────────────────────
const countTokens = str => Math.ceil(str.length / 4);

// ─── API call through Cloudflare Worker ──────────────────────────────────────
async function callGemini(question) {
  // Full resume is always the context — no retrieval needed at this size
  const userMessage = `RESUME:\n${RESUME}\n\nQUESTION: ${question}`;

  const trimmed = conversationHistory.slice(-(MAX_HISTORY_TURNS * 2));
  const messages = [...trimmed.slice(0, -1), { role: 'user', parts: [{ text: userMessage }] }];

  const inputTokens = countTokens(SYSTEM) + messages.reduce((s, m) => s + countTokens(m.parts[0].text), 0);

  const res = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ system: SYSTEM, messages })
  });

  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Worker error ${res.status}: ${err}`);
  }

  const data = await res.json();
  const replyText = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  const outputTokens = countTokens(replyText);

  return { data, inputTokens, outputTokens };
}

// ─── DOM helpers ──────────────────────────────────────────────────────────────
function addLine(text, cls = 'response-line') {
  const out = document.getElementById('output');
  const d = document.createElement('div');
  d.className = 'line ' + cls;
  d.textContent = text;
  out.appendChild(d);
  out.scrollTop = out.scrollHeight;
  return d;
}

function addPromptLine(text) {
  const out = document.getElementById('output');
  const d = document.createElement('div');
  d.className = 'line prompt-line';
  d.textContent = 'visitor@myAI:~$ ' + text;
  out.appendChild(d);
  out.scrollTop = out.scrollHeight;
}

function addDebugLine(ms, inputTokens, outputTokens, historyTurns) {
  const out = document.getElementById('output');
  const d = document.createElement('div');
  d.className = 'line debug';
  d.textContent = `↳ ${ms}ms · ${inputTokens} in / ${outputTokens} out tokens · ${historyTurns} turns in history`;
  out.appendChild(d);
  out.scrollTop = out.scrollHeight;
}

function setBadge(text, cls) {
  const b = document.getElementById('statusBadge');
  b.textContent = text;
  b.className = 'badge ' + cls;
}

function setInputLocked(locked) {
  isLoading = locked;
  document.getElementById('userInput').disabled = locked;
  document.getElementById('runBtn').disabled = locked;
  document.querySelectorAll('.sug').forEach(btn => btn.disabled = locked);
}

// ─── Core ask ─────────────────────────────────────────────────────────────────
window.ask = async function (question) {
  if (!question || !question.trim()) return;
  if (isLoading) return;

  const out = document.getElementById('output');
  setInputLocked(true);
  addLine('');
  addPromptLine(question);
  conversationHistory.push({ role: 'user', parts: [{ text: question }] });

  const typingEl = addLine('', 'response-line');
  const cursor = document.createElement('span');
  cursor.className = 'typing';
  cursor.setAttribute('aria-hidden', 'true');
  typingEl.appendChild(cursor);
  out.scrollTop = out.scrollHeight;

  const t0 = performance.now();

  try {
    const { data, inputTokens, outputTokens } = await callGemini(question);
    const ms = Math.round(performance.now() - t0);

    if (data.error) {
      typingEl.removeChild(cursor);
      typingEl.textContent = 'Error: ' + data.error.message;
      typingEl.className = 'line err';
      conversationHistory.pop();
      setInputLocked(false);
      return;
    }

    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response.';
    conversationHistory.push({ role: 'model', parts: [{ text: reply }] });

    // Trim history to cap
    while (conversationHistory.length > MAX_HISTORY_TURNS * 2) {
      conversationHistory.splice(0, 2);
    }

    typingEl.removeChild(cursor);
    reply.split('\n').filter(l => l.trim()).forEach((l, i) => {
      if (i === 0) typingEl.textContent = l;
      else addLine(l, 'response-line');
    });

    // Live debug line — visible in the UI, no DevTools needed
    addDebugLine(ms, inputTokens, outputTokens, Math.floor(conversationHistory.length / 2));

  } catch (e) {
    if (typingEl.contains(cursor)) typingEl.removeChild(cursor);
    typingEl.textContent = 'Error: ' + e.message;
    typingEl.className = 'line err';
    conversationHistory.pop();
  }

  out.scrollTop = out.scrollHeight;
  setInputLocked(false);
  document.getElementById('userInput').focus();
};

// ─── Input ────────────────────────────────────────────────────────────────────
window.submitInput = function () {
  const inp = document.getElementById('userInput');
  const val = inp.value.trim();
  if (!val) return;
  inp.value = '';
  window.ask(val);
};

window.handleSuggestion = function (question) {
  window.ask(question);
};

document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    window.submitInput();
  }
});

// ─── Boot ─────────────────────────────────────────────────────────────────────
setBadge('v1.0.0 online', 'badge-green');
</script>
</body>
</html>
